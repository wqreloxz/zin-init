# Nginx web server configuration
name = "nginx"
description = "Высокопроизводительный веб-сервер и reverse proxy"
exec = "/usr/sbin/nginx"
args = ["-g", "daemon off;"]
working_dir = "/var/www"
priority = 50
category = "webserver"
enabled = true
depends_on = ["network"]
restart_policy = "OnFailure"
timeout_secs = 30
service_type = "Simple"

user = "www-data"
group = "www-data"

[environment]
NGINX_HOST = "localhost"
NGINX_PORT = "80"
WORKER_PROCESSES = "auto"

[limits]
memory_max = 536870912
nofile = 65536
nproc = 4096
